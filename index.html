*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0a;--bg2:#111;--s:#1e1e1e;--bd:#2a2a2a;--tx:#fff;--tx2:#ccc;--tx3:#555;--acc:#e8b84b;}
body{background:var(--bg);color:var(--tx);font-family:'Barlow',sans-serif;min-height:100vh;font-size:14px}
.header{background:#000;padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100;border-bottom:1px solid #1a1a1a}
.hlogo{display:flex;align-items:center;gap:12px}
.hlogo-text{font-family:'FIFA26',sans-serif;font-size:1.5rem;color:#fff;letter-spacing:.06em}
.hlogo-sub{font-size:.58rem;color:#888;font-weight:600;letter-spacing:.12em;text-transform:uppercase;margin-top:2px}
.huser{display:flex;align-items:center;gap:10px;font-size:.8rem;color:#ccc}
.huser strong{color:#fff}
.btn{padding:8px 16px;border:none;border-radius:4px;cursor:pointer;font-weight:700;font-size:.8rem;transition:all .15s;display:inline-flex;align-items:center;gap:6px;font-family:'Barlow',sans-serif;text-transform:uppercase;letter-spacing:.06em}
.btn-acc{background:#fff;color:#000}.btn-acc:hover{background:#e8b84b}
.btn-outline{background:transparent;color:#aaa;border:1px solid #333}.btn-outline:hover{color:#fff;border-color:#fff}
.btn-dark{background:#1e1e1e;color:#fff;border:1px solid #333}.btn-dark:hover{border-color:#666}
.btn-green{background:#00C853;color:#000}.btn-red{background:#1a0808;color:#ff5252;border:1px solid #4a1010}
.btn-sm{padding:5px 12px;font-size:.72rem}.btn-xs{padding:3px 8px;font-size:.68rem;border-radius:3px}
.btn:disabled{opacity:.35;cursor:not-allowed}
.page{max-width:1060px;margin:0 auto;padding:20px 14px}
.tabs{display:flex;border-bottom:2px solid #1a1a1a;margin-bottom:24px}
.tab{padding:10px 18px;border:none;background:transparent;color:#aaa;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:.95rem;cursor:pointer;transition:all .15s;text-transform:uppercase;letter-spacing:.1em;border-bottom:3px solid transparent;margin-bottom:-2px}
.tab.active{color:#fff;border-bottom-color:#fff}.tab:hover:not(.active){color:#aaa}
.card{background:var(--s);border:1px solid var(--bd);border-radius:12px;padding:18px}
.ctitle{font-family:'Barlow Condensed',sans-serif;font-size:1.3rem;color:#fff;margin-bottom:14px;letter-spacing:.06em;font-weight:800;text-transform:uppercase}
.mcard{background:var(--bg2);border:1px solid var(--bd);border-radius:8px;margin-bottom:8px;overflow:hidden;transition:border-color .15s}
.mcard:hover{border-color:#333}
.mcard.has-res{border-left:3px solid var(--acc)}
.mcard.pts-ok{border-left:3px solid #00C853}.mcard.pts-no{border-left:3px solid #ff5252}
.mcard-meta{background:#080808;padding:4px 14px;display:flex;gap:12px;font-size:.63rem;color:#aaa;font-weight:700;letter-spacing:.06em;text-transform:uppercase;border-bottom:1px solid #111}
.mcard-meta .hora{color:#888}
.mcard-inner{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:6px;padding:10px 14px}
.tside{display:flex;align-items:center;gap:8px;width:100%}
.tside.r{flex-direction:row-reverse}
.tflag{width:32px;height:22px;object-fit:cover;border-radius:2px;flex-shrink:0;display:block}
.tname{font-size:.85rem;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:.03em;flex:1}
.tside.r .tname{text-align:right}
.ssec{display:flex;flex-direction:column;align-items:center;gap:4px;min-width:90px}
.sinputs{display:flex;align-items:center;gap:4px}
.sinput{width:38px;height:38px;border:1.5px solid #2a2a2a;border-radius:4px;background:#111;color:#fff;font-size:1.1rem;font-weight:800;text-align:center;outline:none;font-family:'Barlow Condensed',sans-serif;transition:border-color .15s}
.sinput:focus{border-color:#fff;background:#1a1a1a}
.sinput::-webkit-inner-spin-button,.sinput::-webkit-outer-spin-button{-webkit-appearance:none}
.ssep{color:#333;font-size:1.1rem;font-weight:800}

// ── KNOCKOUT ADVANCEMENT TREE ──────────────────────────────────
// Maps each match to the two matches whose winners feed into it.
// Built from FIFA's official World Cup 2026 match schedule (matches 73-104),
// cross-checked by venue (not by chronological order) against ET_DATA, since
// R32_1..R32_16 / OCT_1..OCT_8 etc. are ordered by kickoff time, not by the
// official FIFA match-numbering bracket structure.
const ADVANCE_TREE = {
  // Octavos ← R32 (by venue: OCT_2=Philadelphia=M89, OCT_1=Houston=M90, etc.)
  'OCT_1':  ['R32_1',  'R32_4'],   // M90: W73 v W75
  'OCT_2':  ['R32_3',  'R32_6'],   // M89: W74 v W77
  'OCT_3':  ['R32_2',  'R32_5'],   // M91: W76 v W78
  'OCT_4':  ['R32_7',  'R32_8'],   // M92: W79 v W80
  'OCT_5':  ['R32_12', 'R32_11'],  // M93: W83 v W84
  'OCT_6':  ['R32_10', 'R32_9'],   // M94: W81 v W82
  'OCT_7':  ['R32_15', 'R32_14'],  // M95: W86 v W88
  'OCT_8':  ['R32_13', 'R32_16'],  // M96: W85 v W87
  // Cuartos ← Octavos (by venue: CUAR_1=Boston=M97, etc.)
  'CUAR_1': ['OCT_2',  'OCT_1'],   // M97: W89 v W90
  'CUAR_2': ['OCT_5',  'OCT_6'],   // M98: W93 v W94
  'CUAR_3': ['OCT_3',  'OCT_4'],   // M99: W91 v W92
  'CUAR_4': ['OCT_7',  'OCT_8'],   // M100: W95 v W96
  // Semis ← Cuartos (by venue: SEMI_1=Dallas=M101, SEMI_2=Atlanta=M102)
  'SEMI_1': ['CUAR_1', 'CUAR_2'],  // M101: W97 v W98
  'SEMI_2': ['CUAR_3', 'CUAR_4'],  // M102: W99 v W100

  'FINAL_1':['SEMI_1', 'SEMI_2'],  // M104: W101 v W102

// Determine the winner of a single elimination match from its real result.
// Returns the team name, or null if the match has no result yet or no teams.
function getMatchWinner(matchId, elimMatches, results) {
  const em = (elimMatches || []).find(m => m.id === matchId);
  if (!em || !em.local || !em.visitante) return null;
  const fase = em.fase;
  const r = results?.[fase]?.[matchId];
  if (!r || r.golesLocal === undefined || r.golesLocal === '' || r.golesVisitante === undefined || r.golesVisitante === '') return null;
  const gl = parseInt(r.golesLocal), gv = parseInt(r.golesVisitante);
  if (isNaN(gl) || isNaN(gv)) return null;
  if (gl > gv) return em.local;
  if (gv > gl) return em.visitante;
  // 90-minute draw: decided by penalties (or extra-time goals stored the same way)
  const pl = parseInt(r.penaltisLocal), pv = parseInt(r.penaltisVisitante);
  if (!isNaN(pl) && !isNaN(pv)) {
    if (pl > pv) return em.local;
    if (pv > pl) return em.visitante;
  }
  return null; // draw with no penalty decision recorded yet
}

// Walk the advancement tree and fill in local/visitante for every
// downstream match whose feeder matches already have a winner.
// Pure function: returns a NEW elimMatches array, does not mutate.
function advanceWinners(elimMatches, results) {
  const ems = JSON.parse(JSON.stringify(elimMatches || []));
  // Process in dependency order: octavos, then cuartos, then semis, then final
  ['OCT_1','OCT_2','OCT_3','OCT_4','OCT_5','OCT_6','OCT_7','OCT_8',
   'CUAR_1','CUAR_2','CUAR_3','CUAR_4','SEMI_1','SEMI_2','FINAL_1'].forEach(targetId => {
    const feeders = ADVANCE_TREE[targetId];
    if (!feeders) return;
    const target = ems.find(m => m.id === targetId);
    if (!target) return;
    const [feedA, feedB] = feeders;
    const winnerA = getMatchWinner(feedA, ems, results);
    const winnerB = getMatchWinner(feedB, ems, results);
    if (winnerA && !target.local) target.local = winnerA;
    if (winnerB && !target.visitante) target.visitante = winnerB;
  });
  return ems;
}





// ── FIFA STANDING ────────────────────────────────────────────
function computeStanding(grupo, matchRes) {
  const teams = GD[grupo].teams;
  const ms = GM.filter(m => m.grupo === grupo);
  const st = {};
  teams.forEach(t => { st[t] = {team:t,pts:0,gf:0,ga:0,gd:0,w:0,d:0,l:0,played:0}; });
  ms.forEach(m => {
    const r = matchRes[m.id];
    if (!r || r.golesLocal === '' || r.golesLocal === undefined) return;
    const gl = parseInt(r.golesLocal), gv = parseInt(r.golesVisitante);
    if (isNaN(gl) || isNaN(gv)) return;
    const L = st[m.local], V = st[m.visitante];
    L.gf+=gl; L.ga+=gv; L.gd+=gl-gv; L.played++;
    V.gf+=gv; V.ga+=gl; V.gd+=gv-gl; V.played++;
    if (gl>gv) { L.pts+=3; L.w++; V.l++; }
    else if (gl===gv) { L.pts+=1; L.d++; V.pts+=1; V.d++; }
    else { V.pts+=3; V.w++; L.l++; }
  });
  function h2h(sub) {
    const h = {};
    sub.forEach(t => h[t.team] = {pts:0,gf:0,ga:0,gd:0});
    ms.forEach(m => {
      if (!sub.find(x => x.team===m.local) || !sub.find(x => x.team===m.visitante)) return;
      const r = matchRes[m.id];
      if (!r || r.golesLocal===undefined || r.golesLocal==='') return;
      const gl = parseInt(r.golesLocal), gv = parseInt(r.golesVisitante);
      if (isNaN(gl) || isNaN(gv)) return;
      h[m.local].gf+=gl; h[m.local].ga+=gv; h[m.local].gd+=gl-gv;
      h[m.visitante].gf+=gv; h[m.visitante].ga+=gl; h[m.visitante].gd+=gv-gl;
      if (gl>gv) h[m.local].pts+=3;
      else if (gl===gv) { h[m.local].pts+=1; h[m.visitante].pts+=1; }
      else h[m.visitante].pts+=3;
    });
    return h;
  }
  const list = teams.map(t => st[t]);
  function cmp(a, b, all) {
    if (b.pts !== a.pts) return b.pts - a.pts;
    const tied = all.filter(t => t.pts === a.pts);
    const hh = h2h(tied);
    const ha = hh[a.team], hb = hh[b.team];
    if (hb.pts !== ha.pts) return hb.pts - ha.pts;
    if (hb.gd !== ha.gd) return hb.gd - ha.gd;
    if (hb.gf !== ha.gf) return hb.gf - ha.gf;
    if (b.gd !== a.gd) return b.gd - a.gd;
    if (b.gf !== a.gf) return b.gf - a.gf;
    return (FIFA_RANK[a.team]||99) - (FIFA_RANK[b.team]||99);
  }
  return [...list].sort((a,b) => cmp(a,b,list));
}

// Standing for a group that respects a manual classification override
// (ST.results.clasificacion[grupo], an array of 4 team names in final order)
// falling back to automatic FIFA-criteria computation when no override exists.
// The override only fixes ORDER; stats (pts/gd/gf) still come from real match
// results, since those are needed to compare thirds across different groups.
function getRealStanding(grupo, matchRes, manualClasif) {
  const computed = computeStanding(grupo, matchRes || {});
  const override = manualClasif?.[grupo];
  if (override && override.length === 4 && override.every(t => t)) {
    return override.map(team => computed.find(s => s.team === team) || {team, grupo, pts:0,gf:0,ga:0,gd:0,played:0});
  }
  return computed;
}

// ── BEST 8 THIRDS ────────────────────────────────────────────────────
// Given all group standings (matchResults per group), find the 8 best thirds
function getBestThirds(allGroupMatchResults, manualClasif) {
  // Get all 12 third-placed teams with their stats
  const thirds = Object.keys(GD).map(grupo => {
    const standing = getRealStanding(grupo, allGroupMatchResults[grupo] || {}, manualClasif);
    const third = standing[2]; // 0-indexed: position 3
    if (!third || !third.played) return null;
    return { ...third, grupo };
  }).filter(Boolean);

  // Sort by FIFA tiebreaker criteria for best thirds:
  // 1. Points  2. GD  3. GF  4. FIFA ranking
  thirds.sort((a, b) => {
    if ((b.pts||0) !== (a.pts||0)) return (b.pts||0) - (a.pts||0);
    if ((b.gd||0) !== (a.gd||0)) return (b.gd||0) - (a.gd||0);
    if ((b.gf||0) !== (a.gf||0)) return (b.gf||0) - (a.gf||0);
    return (FIFA_RANK[a.team] || 99) - (FIFA_RANK[b.team] || 99);
  });

  // Return top 8
  return thirds.slice(0, 8);
}

// ── R32 BRACKET BUILDER ───────────────────────────────────────────────
// Build the full predicted R32 bracket from group standings + best thirds
// Returns array of {slot, local, visitante} for all 16 R32 matches
// For each of the 16 R32 slots, compute the valid team options for local/visitante.
// Fixed slots (1º/2º of a specific group) return a single-team list.
// "Best 3rd" slots return every classified 3rd-place team whose group is one of
// that slot's eligible groups — this is what populates the dropdowns in the
// admin R32 editor, so the admin can only pick a team that's actually eligible
// for that exact slot (never a free-text typo, never an ineligible team).
function getR32SlotOptions(allGroupMatchResults, manualClasif) {
  const standings = {};
  const groupComplete = {};
  Object.keys(GD).forEach(g => {
    standings[g] = getRealStanding(g, allGroupMatchResults[g] || {}, manualClasif);
    const ms = GM.filter(m => m.grupo === g);
    const allPlayed = ms.every(m => {
      const r = (allGroupMatchResults[g] || {})[m.id];
      return r && r.golesLocal !== undefined && r.golesLocal !== '';
    });
    groupComplete[g] = allPlayed || !!manualClasif?.[g];
  });
  function first(g)  { return groupComplete[g] ? (standings[g]?.[0]?.team || null) : null; }
  function second(g) { return groupComplete[g] ? (standings[g]?.[1]?.team || null) : null; }

  // All 12 third-place teams that have actually played at least one match —
  // shown for EVERY "best 3rd" slot, since we no longer try to algorithmically
  // restrict which group's 3rd place can go in which slot (that requires the
  // FIFA's official Annexe C combination table, which isn't available to us).
  // The admin picks the correct team for each slot directly from this full
  // list, based on the real official bracket.
  function allThirdsOptions() {
    return Object.keys(GD)
      .map(g => {
        const standing = getRealStanding(g, allGroupMatchResults[g] || {}, manualClasif);
        const t = standing[2];
        return (t && t.played > 0) ? t.team : null;
      })
      .filter(Boolean);
  }

  // local options, visitante options, per slot — matches BRACKET_LABELS layout
  return {
    'R32_1':  { local: [second('A')].filter(Boolean),  visitante: [second('B')].filter(Boolean) },
    'R32_2':  { local: [first('C')].filter(Boolean),   visitante: [second('F')].filter(Boolean) },
    'R32_3':  { local: [first('E')].filter(Boolean),   visitante: allThirdsOptions() },
    'R32_4':  { local: [first('F')].filter(Boolean),   visitante: [second('C')].filter(Boolean) },
    'R32_5':  { local: [second('E')].filter(Boolean),  visitante: [second('I')].filter(Boolean) },
    'R32_6':  { local: [first('I')].filter(Boolean),   visitante: allThirdsOptions() },
    'R32_7':  { local: [first('A')].filter(Boolean),   visitante: allThirdsOptions() },
    'R32_8':  { local: [first('L')].filter(Boolean),   visitante: allThirdsOptions() },
    'R32_9':  { local: [first('G')].filter(Boolean),   visitante: allThirdsOptions() },
    'R32_10': { local: [first('D')].filter(Boolean),   visitante: allThirdsOptions() },
    'R32_11': { local: [first('H')].filter(Boolean),   visitante: [second('J')].filter(Boolean) },
    'R32_12': { local: [second('K')].filter(Boolean),  visitante: [second('L')].filter(Boolean) },
    'R32_13': { local: [first('B')].filter(Boolean),   visitante: allThirdsOptions() },
    'R32_14': { local: [second('D')].filter(Boolean),  visitante: [second('G')].filter(Boolean) },
    'R32_15': { local: [first('J')].filter(Boolean),   visitante: [second('H')].filter(Boolean) },
    'R32_16': { local: [first('K')].filter(Boolean),   visitante: allThirdsOptions() },
  };
}

function buildPredictedR32(allGroupMatchResults, manualClasif) {
  // Get standings for all groups
  const standings = {};
  const groupComplete = {};
  Object.keys(GD).forEach(g => {
    standings[g] = getRealStanding(g, allGroupMatchResults[g] || {}, manualClasif);
    const ms = GM.filter(m => m.grupo === g);
    const allPlayed = ms.every(m => {
      const r = (allGroupMatchResults[g] || {})[m.id];
      return r && r.golesLocal !== undefined && r.golesLocal !== '';
    });
    groupComplete[g] = allPlayed || !!manualClasif?.[g];
  });

  function first(g)  { return groupComplete[g] ? (standings[g]?.[0]?.team || null) : null; }
  function second(g) { return groupComplete[g] ? (standings[g]?.[1]?.team || null) : null; }
  function third(g)  { return groupComplete[g] ? (standings[g]?.[2]?.team || null) : null; }

  // Get best 8 thirds and map by group
  const best8 = getBestThirds(allGroupMatchResults, manualClasif);
  const best8Groups = new Set(best8.map(t => t.grupo));

  // Assign best thirds to slots using optimal backtracking algorithm
  // This guarantees all slots get filled if mathematically possible
  const THIRD_SLOT_DEFS = [
    {id:'R32_3',  groups:['A','B','C','D','F']},
    {id:'R32_6',  groups:['C','D','F','G','H']},
    {id:'R32_7',  groups:['C','E','F','H','I']},
    {id:'R32_8',  groups:['E','H','I','J','K']},
    {id:'R32_9',  groups:['A','E','H','I','J']},
    {id:'R32_10', groups:['B','E','F','I','J']},
    {id:'R32_13', groups:['E','F','G','I','J']},
    {id:'R32_16', groups:['D','E','I','J','L']},
  ];

  // Build eligible candidates per slot (only from best8)
  const slotCandidates = THIRD_SLOT_DEFS.map(s => ({
    id: s.id,
    candidates: s.groups
      .filter(g => best8Groups.has(g))
      .map(g => best8.find(t => t.grupo === g))
      .filter(Boolean)
      .sort((a,b) => {
        if (b.pts !== a.pts) return b.pts - a.pts;
        if (b.gd !== a.gd) return b.gd - a.gd;
        if (b.gf !== a.gf) return b.gf - a.gf;
        return (FIFA_RANK[a.team]||99) - (FIFA_RANK[b.team]||99);
      })
  }));

  // Backtracking assignment to guarantee maximum coverage
  const thirdAssignment = {};
  function assignThirds(slotIndex, usedTeams) {
    if (slotIndex >= slotCandidates.length) return true;
    const slot = slotCandidates[slotIndex];
    // Try most constrained slots first by sorting remaining slots
    const remaining = slotCandidates.slice(slotIndex);
    remaining.sort((a,b) => {
      const aAvail = a.candidates.filter(t => !usedTeams.has(t.team)).length;
      const bAvail = b.candidates.filter(t => !usedTeams.has(t.team)).length;
      if (aAvail !== bAvail) return aAvail - bAvail;
      return THIRD_SLOT_DEFS.findIndex(s=>s.id===b.id) - THIRD_SLOT_DEFS.findIndex(s=>s.id===a.id);
    });
    // Reorder slotCandidates from slotIndex based on remaining sort
    for (let i = 0; i < remaining.length; i++) slotCandidates[slotIndex + i] = remaining[i];
    
    const current = slotCandidates[slotIndex];
    const available = current.candidates.filter(t => !usedTeams.has(t.team));
    if (available.length === 0) {
      thirdAssignment[current.id] = null;
      return assignThirds(slotIndex + 1, usedTeams);
    }
    for (const candidate of available) {
      thirdAssignment[current.id] = candidate.team;
      usedTeams.add(candidate.team);
      if (assignThirds(slotIndex + 1, usedTeams)) return true;
      usedTeams.delete(candidate.team);
      thirdAssignment[current.id] = null;
    }
    thirdAssignment[current.id] = null;
    return assignThirds(slotIndex + 1, usedTeams);
  }
  assignThirds(0, new Set());

  function bestThirdFrom(groups, slotId) {
    return thirdAssignment[slotId] || null;
  }

  return [
    { id:'R32_1',  local: second('A'),              visitante: second('B') },
    { id:'R32_2',  local: first('C'),               visitante: second('F') },
    { id:'R32_3',  local: first('E'),               visitante: bestThirdFrom(['A','B','C','D','F'], 'R32_3') },
    { id:'R32_4',  local: first('F'),               visitante: second('C') },
    { id:'R32_5',  local: second('E'),              visitante: second('I') },
    { id:'R32_6',  local: first('I'),               visitante: bestThirdFrom(['C','D','F','G','H'], 'R32_6') },
    { id:'R32_7',  local: first('A'),               visitante: bestThirdFrom(['C','E','F','H','I'], 'R32_7') },
    { id:'R32_8',  local: first('L'),               visitante: bestThirdFrom(['E','H','I','J','K'], 'R32_8') },
    { id:'R32_9',  local: first('G'),               visitante: bestThirdFrom(['A','E','H','I','J'], 'R32_9') },
    { id:'R32_10', local: first('D'),               visitante: bestThirdFrom(['B','E','F','I','J'], 'R32_10') },
    { id:'R32_11', local: first('H'),               visitante: second('J') },
    { id:'R32_12', local: second('K'),              visitante: second('L') },
    { id:'R32_13', local: first('B'),               visitante: bestThirdFrom(['E','F','G','I','J'], 'R32_13') },
    { id:'R32_14', local: second('D'),              visitante: second('G') },
    { id:'R32_15', local: first('J'),               visitante: second('H') },
    { id:'R32_16', local: first('K'),               visitante: bestThirdFrom(['D','E','I','J','L'], 'R32_16') },
  ];
}

// ── SCORING: BEST THIRDS + R32 BRACKET BONUS ─────────────────────────

// +3 pts per best third correctly predicted (auto from match bets)
function calcBestThirdsPoints(userBets, realResults) {
  // Build allGroupMatchResults objects for both user and real
  const userGroupBets = {};
  const realGroupResults = {};
  Object.keys(GD).forEach(g => {
    userGroupBets[g] = {};
    realGroupResults[g] = {};
  });
  GM.forEach(m => {
    if (userBets.grupos?.[m.id]) userGroupBets[m.grupo][m.id] = userBets.grupos[m.id];
    if (realResults.grupos?.[m.id]) realGroupResults[m.grupo][m.id] = realResults.grupos[m.id];
  });

  const userBest8 = getBestThirds(userGroupBets);
  const realBest8 = getBestThirds(realGroupResults);
  if (!userBest8.length || !realBest8.length) return 0;

  const realBest8Teams = new Set(realBest8.map(t => t.team));
  let pts = 0;
  userBest8.forEach(t => {
    if (realBest8Teams.has(t.team)) pts += TC.phases.grupos.points.mejor3;
  });
  return pts;
}

// +4 pts per exact R32 matchup predicted correctly (both teams in correct match)
function calcR32BracketBonus(userBets, realResults) {
  // Don't award this bonus until the admin has explicitly confirmed the R32
  // pairings — same reasoning as the r32 match-points block in calcFF: the
  // auto-calculated draft may still need manual correction.
  if (!ST?.r32Confirmed) return 0;

  const userGroupBets = {};
  const realGroupResults = {};
  Object.keys(GD).forEach(g => {
    userGroupBets[g] = {};
    realGroupResults[g] = {};
  });
  GM.forEach(m => {
    if (userBets.grupos?.[m.id]) userGroupBets[m.grupo][m.id] = userBets.grupos[m.id];
    if (realResults.grupos?.[m.id]) realGroupResults[m.grupo][m.id] = realResults.grupos[m.id];
  });

  // Only calculate if real results have enough data
  const realGroupsFilled = Object.keys(GD).filter(g => {
    const ms = GM.filter(m => m.grupo === g);
    return ms.every(m => realGroupResults[g][m.id]?.golesLocal !== undefined);
  });
  if (realGroupsFilled.length < 12) return 0;

  const userR32 = buildPredictedR32(userGroupBets);
  const realR32 = buildPredictedR32(realGroupResults, ST?.results?.clasificacion);

  // Build real R32 lookup by id
  const realMap = {};
  realR32.forEach(m => { realMap[m.id] = m; });

  let pts = 0;
  userR32.forEach(um => {
    const rm = realMap[um.id];
    if (!rm) return;
    // Exact match: same two teams in same slot (order matters - local vs visitante)
    if (um.local && um.visitante && rm.local && rm.visitante) {
      if (um.local === rm.local && um.visitante === rm.visitante) pts += TC.phases.r32.points.emparej;
    }
  });
  return pts;
}


// ── SCORING ──────────────────────────────────────────────────
function calcPts(ap, res, fase) {
  if (!ap || !res) return 0;
  const pts = TC.phases[fase]?.points || TC.phases.grupos.points;
  let tot = 0;
  const gla = parseInt(ap.golesLocal), gva = parseInt(ap.golesVisitante);
  const glr = parseInt(res.golesLocal), gvr = parseInt(res.golesVisitante);
  if (isNaN(gla)||isNaN(gva)||isNaN(glr)||isNaN(gvr)) return 0;

  // 1. Signo 1/X/2
  const sa = gla>gva?'1':gla<gva?'2':'X';
  const sr = glr>gvr?'1':glr<gvr?'2':'X';
  if (sa===sr) tot += pts.ganador;

  // 2. Marcador individual (local y visitante por separado)
  if (pts.marcador) {
    if (gla===glr) tot += pts.marcador;   // local score correct
    if (gva===gvr) tot += pts.marcador;   // visitante score correct
  }

  // 3. Bonus resultado exacto (ambos correctos)
  if (gla===glr && gva===gvr) tot += pts.exacto;

  // 4. Penaltis: exact shootout result (only when draw at 120min)
  if (fase!=='grupos' && pts.penaltis && res.penaltisLocal!==undefined) {
    const pla = parseInt(ap.penaltisLocal), pva = parseInt(ap.penaltisVisitante);
    const plr = parseInt(res.penaltisLocal), pvr = parseInt(res.penaltisVisitante);
    if (!isNaN(pla)&&!isNaN(pva)&&!isNaN(plr)&&!isNaN(pvr)) {
      if (pla===plr && pva===pvr) tot += pts.penaltis;
    }
  }

  return tot;
}
function calcClasif(p, r) {
  if (!p || !r) return 0;
  const pts = TC.phases.grupos.points;
  let t = 0;
  // pts.posicion per each position correctly predicted (all 4 positions)
  for (let i = 0; i < 4; i++) {
    if (p[i] && r[i] && p[i]===r[i]) t += pts.posicion;
  }
  return t;
}
function calcFG(bets, results) {
  // Fase de Grupos: ONLY match points (no classification until phase ends)
  if (!bets) return 0;
  let t = 0;
  GM.forEach(m => { t += calcPts(bets.grupos?.[m.id], results.grupos?.[m.id], 'grupos'); });
  return t;
}

function calcFGClasif(bets, results) {
  // Classification bonus: only counted once group phase is over
  if (!bets) return 0;
  return calcFGClasifBreakdown(bets, results).total;
}

// Same calculation as calcFGClasif, but returns the breakdown by category so
// the UI can show participants exactly where their points come from, instead
// of only the aggregated total — this is purely a display helper, the totals
// always match calcFGClasif/calcTotal exactly since it's the same underlying logic.
function calcFGClasifBreakdown(bets, results) {
  const breakdown = { posicion: 0, posicionDetalle: [], mejor3: 0, mejor3Detalle: null, r32: 0, r32Detalle: [] };
  if (!bets) return { ...breakdown, total: 0 };

  // Posición en tabla
  Object.keys(GD).forEach(g => {
    const pred = computeStanding(g, bets.grupos||{}).map(s => s.team);
    let real = results.clasificacion?.[g];
    if (!real || real.length < 4) {
      const gMatches = GM.filter(m => m.grupo===g);
      const allPlayed = gMatches.every(m => results.grupos?.[m.id]?.golesLocal !== undefined);
      if (allPlayed) real = computeStanding(g, results.grupos||{}).map(s => s.team);
    }
    if (real && real.length >= 4) {
      const pts = calcClasif(pred, real);
      if (pts > 0) breakdown.posicionDetalle.push({ grupo: g, pts });
      breakdown.posicion += pts;
    }
  });

  // Mejores terceros (kept as a single aggregate — calcBestThirdsPoints doesn't expose a per-team breakdown)
  breakdown.mejor3 = calcBestThirdsPoints(bets, results);

  // Emparejamientos 16avos
  breakdown.r32 = calcR32BracketBonus(bets, results);

  breakdown.total = breakdown.posicion + breakdown.mejor3 + breakdown.r32;
  return breakdown;
}

function calcFF(bets, results, elimMatches) {
  // Fase Final (eliminatorias): all elim match points + pase + emparej + campeon
  if (!bets) return 0;
  let t = 0;
  const ems = elimMatches || ST?.elimMatches || ET_DATA;
  ['r32','octavos','cuartos','semis','final'].forEach(fase => {
    const fasePts = TC.phases[fase].points;
    // R32 points (signo/marcador/exacto/penaltis) only count once the admin has
    // explicitly confirmed the bracket — the auto-calculated pairings may need
    // manual correction before they're final, and we don't want to score against
    // a still-editable draft.
    if (fase === 'r32' && !ST?.r32Confirmed) return;
    Object.entries(results[fase]||{}).forEach(([id, res]) => {
      t += calcPts(bets[fase]?.[id], res, fase);
      if (fasePts.pase && fase !== 'r32') {
        const match = ems.find(m => m.id===id);
        if (match) {
          const userBracket = getUserPredictedBracket(bets, fase, ems);
          const userMatch = userBracket.find(m => m.id===id);
          if (userMatch) {
            if (match.local && userMatch.local===match.local) t += fasePts.pase;
            if (match.visitante && userMatch.visitante===match.visitante) t += fasePts.pase;
          }
        }
      }
      if (fasePts.emparej && fase !== 'r32') {
        const match = ems.find(m => m.id===id);
        if (match) {
          const userBracket = getUserPredictedBracket(bets, fase, ems);
          const userMatch = userBracket.find(m => m.id===id);
          if (userMatch && userMatch.local && userMatch.visitante &&
              userMatch.local===match.local && userMatch.visitante===match.visitante) {
            t += fasePts.emparej;
          }
        }
      }
    });
  });
  // Campeon
  const finalRes = Object.values(results.final||{});
  if (finalRes.length > 0) {
    const realFinal = finalRes[0];
    if (realFinal?.ganador) {
      const userFinalMatch = Object.entries(bets.final||{})[0];
      if (userFinalMatch && userFinalMatch[1]?.ganadorFinal===realFinal.ganador) {
        t += TC.phases.final.points.campeon;
      }
    }
  }
  return t;
}

function calcTotal(bets, results, elimMatches) {
  elimMatches = elimMatches || ST?.elimMatches || ET_DATA;
  if (!bets) return 0;
  const phase = ST?.tournamentPhase || 'grupos';

  // Match points always count
  let t = calcFG(bets, results);

  // Classification bonus ONLY when group phase is over
  if (phase !== 'grupos') {
    t += calcFGClasif(bets, results);
  }

  // Elimination points

  t += calcFF(bets, results, elimMatches);

  return t;
}

// Helper: build predicted bracket for a given elim fase based on user's elimination bets
function getUserPredictedBracket(bets, fase, ems) {
  // For now return the actual ems with user's bet info
  // In full implementation this would trace the bracket from r32 onwards
  return ems.filter(m => m.fase === fase);
}

// ── AMERICAN DATE HELPER ─────────────────────────────────────────
function getAmericanDate(fecha, hora) {
  // Converts Spanish fecha+hora to American jornada date
  // Matches before 18:00h Spanish = still previous American day
  if (!fecha || !hora) return fecha;
  const h = parseInt(hora.split(':')[0]);
  const [day, month] = fecha.split('/').map(Number);
  if (h < 18) {
    // Previous American day
    let d = day - 1, m = month;
    if (d === 0) {
      m -= 1;
      const daysInMonth = {1:31,2:28,3:31,4:30,5:31,6:30,7:31,8:31,9:30,10:31,11:30,12:31};
      d = daysInMonth[m] || 30;
    }
    return d + '/' + m;
  }
  return fecha;
}

function getLastAmericanJornada(results) {
  // Find the most recent American jornada with results
  // Use horaLocal field which has the correct local American date
  const played = GM.filter(m => results.grupos?.[m.id]?.golesLocal !== undefined);
  if (!played.length) return null;
  const dates = played.map(m => {
    if (m.horaLocal) {
      // horaLocal format: "13/6 21:00 PT" - extract date part
      return m.horaLocal.split(' ')[0];
    }
    return getAmericanDate(m.fecha, m.hora);
  });
  const sorted = [...new Set(dates)].sort((a,b) => {
    const [da,ma] = a.split('/').map(Number);
    const [db,mb] = b.split('/').map(Number);
    return (ma*100+da) - (mb*100+db);
  });
  return sorted[sorted.length - 1];
}

function calcJornadaPts(bets, results, jornada) {
  // Points scored in a specific American jornada
  if (!bets || !jornada) return 0;
  const jornadaMatches = GM.filter(m => {
    const localDate = m.horaLocal ? m.horaLocal.split(' ')[0] : getAmericanDate(m.fecha, m.hora);
    return localDate === jornada;
  });
  return jornadaMatches.reduce((s, m) => {
    return s + calcPts(bets.grupos?.[m.id], results.grupos?.[m.id], 'grupos');
  }, 0);
}

  try {
    await fetch(SB_URL+'/rest/v1/porra_state_test?id=eq.main', {
      method:'PATCH',
      headers:{...SB_HEADERS,'Prefer':'return=minimal'},
      body: JSON.stringify({data:s, updated_at:new Date().toISOString()})
    });
  } catch(e) { console.warn('Supabase save failed:', e.message); }
}

  return {

async function boot() {
  // Show loading screen
  const app = document.getElementById('app');
  app.innerHTML = '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0a0a0a"><div style="text-align:center;color:#444"><div style="font-family:FIFA26,sans-serif;font-size:3rem;color:#fff;margin-bottom:16px">26</div><div style="font-size:.8rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;margin-bottom:20px">Cargando porra...</div><div style="width:40px;height:3px;background:#e8b84b;margin:0 auto;animation:pulse 1s ease-in-out infinite"></div></div></div><style>@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}</style>';
  // Always clear localStorage on boot to force fresh data from Supabase
  try { localStorage.removeItem(SK); } catch{}
  const s = await loadSt();
  const base = initSt();
  if (s && s.participants) {
    ST = {...base,...s, results:{...base.results,...s.results}, elimMatches:s.elimMatches||ET_DATA};
    // Merge default participants if they don't exist yet
    const existingIds = new Set(ST.participants.map(p=>p.nombre));
    const missing = base.participants.filter(p=>!p.isAdmin && !existingIds.has(p.nombre));
    if (missing.length > 0) {
      ST.participants = [...ST.participants, ...missing];
      await saveSt(ST);
    }
  } else {
    ST = base;
  }
  // Apply saved config to TC if exists
  if (ST.config && ST.config.phases) {
    Object.entries(ST.config.phases).forEach(([fase, pts]) => {
      if (TC.phases[fase]) Object.assign(TC.phases[fase].points, pts);
    });
  }
  render();
}

function save(next) {
  ST=next;
  saveSt(next).then(() => {
    // Verify save succeeded - update UI indicator
    const saveIndicator = document.getElementById('save-indicator');
    if (saveIndicator) {
      saveIndicator.textContent = '✓ Guardado';
      saveIndicator.style.color = '#00C853';
      setTimeout(() => { saveIndicator.textContent = ''; }, 2000);
    }
  }).catch(e => {
    console.error('Save failed:', e);
    const saveIndicator = document.getElementById('save-indicator');
    if (saveIndicator) {
      saveIndicator.textContent = '⚠️ Error al guardar';
      saveIndicator.style.color = '#ff5252';
    }
  });
  render();
}
function saveOnly(next) {
  ST=next;
  saveSt(next); // async fire and forget
}

// ── DOM HELPERS ───────────────────────────────────────────────
function h(tag, attrs={}, children=[]) {
  const el = document.createElement(tag);
  Object.entries(attrs).forEach(([k,v]) => {
    if (k==='cls') el.className=v;
    else if (k==='style' && typeof v==='object') Object.assign(el.style, v);
    else if (k.startsWith('on')) el[k]=v;
    else el.setAttribute(k, v);
  });
  children.forEach(c => {
    if (c==null) return;
    el.appendChild(typeof c==='string'||typeof c==='number' ? document.createTextNode(String(c)) : c);
  });
  return el;
}
const tx = s => document.createTextNode(String(s));

function scoreInput(val, onChange, disabled) {
  const inp = h('input', {cls:'sinput', type:'number', min:'0', max:'99', placeholder:'-'});
  inp.value = val ?? '';
  if (disabled) inp.disabled = true;
  inp.oninput = e => {
    const v = e.target.value;
    if (v==='' || isNaN(parseInt(v))) { onChange(''); }
    else { const n=Math.max(0,parseInt(v)); onChange(n); e.target.value=n; }
  };
  return inp;
}

function teamSide(team, reverse) {
  const wrap = h('div', {cls: `tside${reverse?' r':''}`});
  const flag = flImg(team);
  const name = h('span', {cls:'tname'}, [team||'']);
  // local: flag(edge) --- name(center)
  // visitor: name(center) --- flag(edge)  [via row-reverse: name first, flag second = flag right]
  wrap.append(flag, name);
  return wrap;
}

function standingTable(grupo, matchResults, manualOverride) {
  const color = GD[grupo].color;
  const isManual = !!(manualOverride && manualOverride.length === 4 && manualOverride.every(t=>t));
  const standing = isManual
    ? manualOverride.map(team => {
        const computed = computeStanding(grupo, matchResults).find(s => s.team === team);
        return computed || {team, pts:0,gf:0,ga:0,gd:0,played:0,w:0,d:0,l:0};
      })
    : computeStanding(grupo, matchResults);
  const anyPlayed = standing.some(s => s.played > 0);
  const allPlayed = standing.every(s => s.played === 3);
  const wrap = h('div', {cls:'stable-wrap'});
  if (!anyPlayed && !isManual) {
    wrap.append(h('div', {style:{padding:'12px',fontSize:'.72rem',color:'#333',fontWeight:'600',textAlign:'center'}}, ['Rellena los partidos para ver la tabla']));
    return wrap;
  }
  const tbl = h('table', {cls:'stable',id:'ranking-table'});

  const tbody = h('tbody');
  standing.forEach((s, i) => {
    const tr = h('tr', {cls: i===0?'srow0':i===1?'srow1':''});
    const posEl = h('span', {style:{width:'20px',height:'20px',borderRadius:'3px',display:'inline-flex',alignItems:'center',justifyContent:'center',fontWeight:'800',fontSize:'.72rem',fontFamily:"'Barlow Condensed',sans-serif",background:i<2?color:'#1e1e1e',color:i<2?'#000':'#555'}}, [i<2?'↑':'↓']);
    const td0 = h('td'); td0.append(posEl);
    const td1 = h('td'); td1.append(flImg(s.team)); td1.append(h('span',{style:{marginLeft:'6px'}},[s.team]));
    const dg = s.gd>0 ? '+'+s.gd : s.gd.toString();
    const tdDG = h('td'); tdDG.style.color = s.gd>0?'#00C853':s.gd<0?'#ff5252':'#444'; tdDG.style.fontWeight='700'; tdDG.textContent=dg;
    const tdP = h('td'); tdP.style.fontWeight='900'; tdP.style.fontFamily="'Barlow Condensed',sans-serif"; tdP.style.fontSize='1rem'; tdP.style.color='#fff'; tdP.textContent=s.pts;
    tr.append(td0,td1,h('td',{},[s.played]),h('td',{},[s.w]),h('td',{},[s.d]),h('td',{},[s.l]),h('td',{},[s.gf]),h('td',{},[s.ga]),tdDG,tdP);
    tbody.append(tr);
  });
  tbl.append(thead, tbody);
  wrap.append(tbl);
  const noteStyle = (allPlayed||isManual) ? {padding:'7px 10px',fontSize:'.65rem',color:'#00C853',fontWeight:'700',borderTop:'1px solid #1a1a1a',letterSpacing:'.06em',textTransform:'uppercase'} : {padding:'7px 10px',fontSize:'.65rem',color:'#333',fontWeight:'700',borderTop:'1px solid #1a1a1a',letterSpacing:'.06em',textTransform:'uppercase'};
  const noteText = isManual ? '✋ Orden fijado manualmente' : allPlayed ? '✅ Clasificación predicha final' : 'Predicción automática · Criterios FIFA';
  wrap.append(h('div', {style:noteStyle}, [noteText]));
  return wrap;
}

// ── MATCH CARD ────────────────────────────────────────────────
function matchCard(match, ap, res, onBetChange, readOnly, fase, groupColor) {
  const pts = res ? calcPts(ap, res, fase||'grupos') : null;
  let cls = 'mcard';
  if (res) cls += ' has-res';
  if (pts!==null && res) cls += pts>0 ? ' pts-ok' : ' pts-no';
  const isElim = fase && fase !== 'grupos';
  const card = h('div', {cls});
  const meta = h('div', {cls:'mcard-meta'});
  // Primary: local American date/time. Secondary: Spanish time
  if (match.horaLocal) {
    meta.append(h('span',{},[match.horaLocal]));
    if (match.hora) meta.append(h('span',{style:{color:'#555'}},['('+match.hora+'h ESP)']));
  } else {
    const horaStr = match.hora ? ' · '+match.hora+'h (esp)' : '';
    meta.append(h('span',{},[match.fecha+horaStr]));
  }
  if (match.sede) meta.append(h('span',{},[match.sede]));
  else if (match.label) meta.append(h('span',{},[match.label]));
  card.append(meta);
  const inner = h('div', {cls:'mcard-inner'});
  inner.append(teamSide(match.local, false));
  const ss = h('div', {cls:'ssec'});
  if (readOnly) {
    const rd = h('div', {cls:'rdisp'});
    rd.append(h('span',{},[String(ap?.golesLocal??'-')]), h('span',{style:{color:'#222',margin:'0 2px'}},['·']), h('span',{},[String(ap?.golesVisitante??'-')]));
    ss.append(rd);
  } else {
    const si = h('div', {cls:'sinputs'});
    const il = scoreInput(ap?.golesLocal, v => { if(!ap) ap={}; ap.golesLocal=v; onBetChange('golesLocal',v); });
    const iv = scoreInput(ap?.golesVisitante, v => { if(!ap) ap={}; ap.golesVisitante=v; onBetChange('golesVisitante',v); });
    si.append(il, h('span',{cls:'ssep'},[':']), iv);
    ss.append(si);
    if (isElim) {
      const pw = h('div', {style:{marginTop:'5px',textAlign:'center'}});
      const ps = h('select', {cls:'psel'});
      ps.append(h('option',{value:''},['-']));
      if (match.local) ps.append(h('option',{value:match.local},[fl(match.local)+' '+match.local]));
      if (match.visitante) ps.append(h('option',{value:match.visitante},[fl(match.visitante)+' '+match.visitante]));
      ps.value = ap?.penaltisGanador || '';
      ps.onchange = e => onBetChange('penaltisGanador', e.target.value);
      pw.append(h('span',{style:{fontSize:'.65rem',color:'#333',marginRight:'5px',fontWeight:'700'}},['PENALTIS:']), ps);
      ss.append(pw);
    }
  }
  if (res) ss.append(h('div',{style:{fontSize:'.65rem',color:'#666',fontWeight:'700',marginTop:'3px',letterSpacing:'.06em'}},['REAL: '+res.golesLocal+'-'+res.golesVisitante]));
  if (pts!==null) ss.append(h('span',{cls:'ptsbadge'},['+'+pts+' pts']));
  inner.append(ss);
  inner.append(teamSide(match.visitante, true));
  card.append(inner);
  return card;
}

// ── EXPORT: tall vertical ranking JPG (mobile-first, no zoom needed) ──
// Builds a dedicated off-screen layout (NOT the live table) sized to a fixed
// mobile width with a height that grows to fit every participant, so the
// final image only ever needs vertical scrolling, never horizontal and never zoom.
async function exportRankingJPG(rankData, prevPosMap, opts) {
  const { title, subtitle, lastJornada } = opts;
  const W = 1080; // fixed canvas width (high-res mobile-first)
  const PAD_X = 20;
  const PAD_TOP = 110;   // generous top margin so header is never cut off
  const PAD_BOTTOM = 56;
  const ROW_H = 124; // tight line-height: row height close to the text size, not airy

  const root = document.createElement('div');
  root.style.cssText = `position:fixed;left:-9999px;top:0;width:${W}px;background:#0a0a0a;font-family:'Barlow Condensed',sans-serif;`;

  const inner = document.createElement('div');
  inner.style.cssText = `padding:${PAD_TOP}px ${PAD_X}px ${PAD_BOTTOM}px;`;

  // Header
  const header = document.createElement('div');
  header.style.cssText = 'margin-bottom:32px;';
  header.innerHTML = `
    <div style="width:64px;height:5px;background:#e8b84b;margin-bottom:18px;border-radius:2px;"></div>
    <div style="font-family:'FIFA26',sans-serif;font-size:3rem;color:#fff;line-height:1.05;letter-spacing:.04em;">${title}</div>
    <div style="font-size:1.3rem;color:#999;font-weight:700;letter-spacing:.04em;margin-top:8px;text-transform:uppercase;">${subtitle}</div>
  `;
  inner.appendChild(header);

  // Rows container
  const list = document.createElement('div');
  list.style.cssText = 'display:flex;flex-direction:column;';

  rankData.forEach((p, idx) => {
    const prevPos = prevPosMap[p.id] || p.pos;
    const posDiff = prevPos - p.pos;
    const rowBg = p.pos===1 ? 'rgba(232,184,75,.10)' : p.pos===2 ? 'rgba(220,220,220,.07)' : p.pos===3 ? 'rgba(205,127,50,.08)' : (idx % 2 === 1 ? 'rgba(255,255,255,.02)' : 'transparent');
    const posColor = p.pos===1 ? '#e8b84b' : p.pos===2 ? '#d9d9d9' : p.pos===3 ? '#cd7f32' : '#666';

    let arrowHtml;
    if (!lastJornada || posDiff === 0) {
      arrowHtml = `<span style="color:#3a3a3a;font-size:1.5rem;font-weight:800;">—</span>`;
    } else if (posDiff > 0) {
      arrowHtml = `<span style="color:#00C853;font-size:1.5rem;font-weight:800;white-space:nowrap;">▲${posDiff}</span>`;
    } else {
      arrowHtml = `<span style="color:#ff5252;font-size:1.5rem;font-weight:800;white-space:nowrap;">▼${Math.abs(posDiff)}</span>`;
    }

    const row = document.createElement('div');
    row.style.cssText = `display:flex;align-items:center;height:${ROW_H}px;background:${rowBg};border-bottom:1px solid #1a1a1a;padding:0 4px;box-sizing:border-box;`;
    row.innerHTML = `
      <div style="width:56px;flex:0 0 56px;font-size:3.1rem;font-weight:900;color:${posColor};text-align:center;line-height:1;">${p.pos}</div>
      <div style="width:48px;flex:0 0 48px;text-align:center;line-height:1;">${arrowHtml}</div>
      <div style="flex:1;min-width:0;font-size:3rem;font-weight:700;color:#fff;overflow:hidden;white-space:nowrap;padding-right:8px;line-height:1;">${escapeHtml(truncateName(p.alias || p.nombre, 18))}</div>
      <div style="font-size:3.4rem;font-weight:900;color:#fff;white-space:nowrap;line-height:1;">${p.pts}<span style="font-size:1.3rem;color:#777;font-weight:700;margin-left:3px;">pts</span></div>
    `;
    list.appendChild(row);
  });
  inner.appendChild(list);

  // Footer timestamp
  const footer = document.createElement('div');
  footer.style.cssText = 'margin-top:28px;font-size:1rem;color:#444;font-weight:600;text-align:center;letter-spacing:.04em;';
  footer.textContent = 'Generado ' + new Date().toLocaleString('es-ES');
  inner.appendChild(footer);

  root.appendChild(inner);
  document.body.appendChild(root);

  // Let layout settle (web fonts etc.) before snapshotting
  await new Promise(r => setTimeout(r, 60));

  try {
    const canvas = await html2canvas(root, {
      backgroundColor: '#0a0a0a',
      scale: 2.2, // high resolution without producing an unworkably huge file
      width: W,
      windowWidth: W,
      height: root.scrollHeight,
      windowHeight: root.scrollHeight,
    });
    return canvas;
  } finally {
    document.body.removeChild(root);
  }
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
// html2canvas does not reliably honor CSS text-overflow:ellipsis, so long
// names are truncated manually by character count before being inserted.
function truncateName(s, maxChars) {
  s = String(s);
  if (s.length <= maxChars) return s;
  return s.slice(0, maxChars - 1).trimEnd() + '…';
}

        })).sort((a,b)=>b.jPts-a.jPts).map((p,i)=>({...p,jPos:i+1}));

        const jHd = h('thead');

          tr.append(

          );

        });
        jTbl.append(jHd,jTb);

      }
      rankContentEl.append(jCard);

    }

    // ── GENERAL RANKING ─────────────────────────────────────

  const tbl = h('table', {cls:'rtable'});
  const hd = h('thead');
  hd.innerHTML = '<tr><th>#</th><th></th><th>Participante</th><th>TOTAL</th><th>Fase Grupos</th><th>Clasif. + Emparej.</th><th>Fase Final</th>'+(lastJornada?'<th>Jornada '+lastJornada+'</th>':'')+'</tr>';
  const tb = h('tbody');
  rank.forEach(p => {
    const tr = h('tr');
    if (p.id===CU?.id) tr.style.background='#111';
    const pc = p.pos===1?'rpos g':p.pos===2?'rpos sv':p.pos===3?'rpos br':'rpos';
    const gc = Object.keys(ST.bets[p.id]?.grupos||{}).length;
    const ntd = h('td');
    ntd.append(h('span',{cls:'fw7'},[p.alias||p.nombre]));
    if (p.id===CU?.id) ntd.append(h('span',{style:{marginLeft:'4px',fontSize:'.65rem',background:'#fff',color:'#000',padding:'1px 8px',borderRadius:'3px',fontWeight:'800',letterSpacing:'.06em'}},['TÚ']));
    const phase = ST?.tournamentPhase || 'grupos';
    const fgPts = calcFG(ST.bets[p.id]||{}, ST.results);
    const clasifPts = phase!=='grupos' ? calcFGClasif(ST.bets[p.id]||{}, ST.results) : 0;
    const ffPts = calcFF(ST.bets[p.id]||{}, ST.results, ST.elimMatches);

    // Position change indicator
    const prevPos = prevPosMap[p.id] || p.pos;
    const posDiff = prevPos - p.pos; // positive = moved up
    let posChangeEl;
    if (!lastJornada || posDiff === 0) {
      posChangeEl = h('td',{style:{width:'32px',textAlign:'center',color:'#333',fontSize:'.7rem'}},['—']);
    } else if (posDiff > 0) {
      posChangeEl = h('td',{style:{width:'32px',textAlign:'center'}},
        [h('span',{style:{color:'#00C853',fontSize:'.72rem',fontWeight:'800'}},['▲'+posDiff])]);
    } else {
      posChangeEl = h('td',{style:{width:'32px',textAlign:'center'}},
        [h('span',{style:{color:'#ff5252',fontSize:'.72rem',fontWeight:'800'}},['▼'+Math.abs(posDiff)])]);
    }

    // Jornada pts
    const jEl = lastJornada ? h('td',{style:{fontFamily:"'Barlow Condensed',sans-serif",fontSize:'1rem',fontWeight:'700',color:p.jPts>0?'#fff':'#333',textAlign:'center'}},[p.jPts>0?'+'+p.jPts:'—']) : null;

    const posTd = h('td',{cls:'export-pos'},[h('span',{cls:pc},[p.pos.toString()])]);
    posChangeEl.classList.add('export-hide');
    ntd.classList.add('export-name');
    const totalTd = h('td',{cls:'export-pts'},[h('span',{cls:'rpts'},[p.pts.toString()])]);
    const fgTd = h('td',{cls:'export-hide',style:{fontFamily:"'Barlow Condensed',sans-serif",fontSize:'1.1rem',fontWeight:'700',color:'#4fc3f7',textAlign:'center'}},[fgPts+' pts']);
    const clasifTd = h('td',{cls:'export-hide',style:{fontFamily:"'Barlow Condensed',sans-serif",fontSize:'1.1rem',fontWeight:'700',color:'#ce93d8',textAlign:'center'}},[phase!=='grupos' ? clasifPts+' pts' : '—']);
    const ffTd = h('td',{cls:'export-hide',style:{fontFamily:"'Barlow Condensed',sans-serif",fontSize:'1.1rem',fontWeight:'700',color:'#ffcc80',textAlign:'center'}},[ffPts>0?ffPts+' pts':'—']);
    const rowChildren = [posTd, posChangeEl, ntd, totalTd, fgTd, clasifTd, ffTd];
    if (jEl) { jEl.classList.add('export-hide'); rowChildren.push(jEl); }
    tr.append(...rowChildren);
    tb.append(tr);
  });
  if (!rank.length) {
    const tr = h('tr');
    tr.append(h('td',{colspan:'4',style:{textAlign:'center',padding:'28px',color:'#333'}},['Sin participantes aún.']));
    tb.append(tr);
  }
  tbl.append(hd,tb); card.append(tbl);
    rankContentEl.append(card);
  } // end renderRankContent

  renderRankContent();
  return frag;
}

// ── ADMIN: EDIT A PARTICIPANT'S GROUP BETS ─────────────────────
// ── BRACKET TREE VIEW (admin) ──────────────────────────────────
// Renders the full 31-match knockout tree (R32 → Octavos → Cuartos → Semis →
// Final) as a compact visual, mirroring the official two-half bracket layout.
// Updates live from `ems` (current elimMatches draft) — shows '?' for any
// slot that isn't known yet.
const BRACKET_QUADRANTS = [
  // top-left, top-right, bottom-left, bottom-right — each with its 4 R32 ids
  // in the order that matches the real bracket geometry (so OCT pairs line up)
  { r32: ['R32_3','R32_6','R32_1','R32_4'],   oct: ['OCT_2','OCT_1'],  cuar: 'CUAR_1' },
  { r32: ['R32_2','R32_5','R32_7','R32_8'],   oct: ['OCT_3','OCT_4'],  cuar: 'CUAR_3' },
  { r32: ['R32_12','R32_11','R32_10','R32_9'],oct: ['OCT_5','OCT_6'],  cuar: 'CUAR_2' },
  { r32: ['R32_15','R32_14','R32_13','R32_16'],oct:['OCT_7','OCT_8'],  cuar: 'CUAR_4' },
];
function bracketSlotBox(ems, matchId, align) {
  const em = (ems||[]).find(m => m.id === matchId);
  const local = em?.local || '?';
  const visit = em?.visitante || '?';
  const box = h('div', {style:{
    border:'1px solid #2a2a2a', borderRadius:'4px', padding:'4px 8px', marginBottom:'3px',
    fontSize:'.66rem', fontWeight:'700', color: '#ccc', background:'#141414',
    textAlign: align||'left', minWidth:'92px', fontFamily:"'Barlow Condensed',sans-serif",
  }});
  box.append(
    h('div',{style:{color: local==='?'?'#444':'#fff', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis'}},[local]),
    h('div',{style:{color: visit==='?'?'#444':'#fff', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis'}},[visit]),
  );
  return box;
}
function bracketTreeView(ems) {
  const wrap = h('div', {cls:'card mb4', style:{padding:'14px', overflowX:'auto'}});
  wrap.append(h('div',{cls:'ctitle'},['🏆 Cuadro completo (en vivo según resultados)']));
  const grid = h('div', {style:{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'14px', minWidth:'620px'}});

  BRACKET_QUADRANTS.forEach((q, qi) => {
    const col = h('div', {style:{display:'flex', flexDirection:'column', gap:'4px'}});
    col.append(h('div',{style:{fontSize:'.62rem',color:'#555',fontWeight:'800',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:'2px'}},['Dieciseisavos']));
    q.r32.forEach(id => col.append(bracketSlotBox(ems, id)));
    col.append(h('div',{style:{fontSize:'.62rem',color:'#555',fontWeight:'800',textTransform:'uppercase',letterSpacing:'.06em',margin:'6px 0 2px'}},['Octavos']));
    q.oct.forEach(id => col.append(bracketSlotBox(ems, id)));
    col.append(h('div',{style:{fontSize:'.62rem',color:'#e8b84b',fontWeight:'800',textTransform:'uppercase',letterSpacing:'.06em',margin:'6px 0 2px'}},['Cuartos']));
    col.append(bracketSlotBox(ems, q.cuar));
    grid.append(col);
  });
  wrap.append(grid);

  const semisRow = h('div',{style:{display:'flex', gap:'24px', marginTop:'14px', alignItems:'center', flexWrap:'wrap'}});
  semisRow.append(
    h('div',{},[h('div',{style:{fontSize:'.62rem',color:'#555',fontWeight:'800',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:'2px'}},['Semifinal 1']), bracketSlotBox(ems,'SEMI_1')]),
    h('div',{},[h('div',{style:{fontSize:'.62rem',color:'#555',fontWeight:'800',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:'2px'}},['Semifinal 2']), bracketSlotBox(ems,'SEMI_2')]),
    h('div',{},[h('div',{style:{fontSize:'.68rem',color:'#e8b84b',fontWeight:'900',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:'2px'}},['🏆 Final']), bracketSlotBox(ems,'FINAL_1')]),
  );
  wrap.append(semisRow);
  return wrap;
}

    if (fp.marcador) pillData.push(['Marcador', fp.marcador]);
    if (fp.exacto) pillData.push(['Exacto', fp.exacto]);
    if (fp.penaltis) pillData.push(['Penaltis', fp.penaltis]);
    if (fp.campeon) pillData.push(['Campeón', fp.campeon]);
    pillData.forEach(([l,p]) => {
      const pill = h('div',{cls:'ptpill'}); pill.innerHTML=`${l} <strong>+${p}</strong>`; fh.append(pill);
    });
    frag.append(fh);
    // Show ALL matches for this fase - with real teams if known, bracket labels if not
    const allFaseMatches = (ST.elimMatches||ET).filter(m => m.fase===fase);
    if (!allFaseMatches.length) {
      frag.append(h('div',{style:{background:'#111',border:'1px solid #1a1a1a',borderRadius:'8px',padding:'14px',marginBottom:'16px',color:'#333',fontSize:'.75rem',fontWeight:'700',textTransform:'uppercase',letterSpacing:'.08em'}},['Sin partidos definidos para esta fase']));
      return;
    }
    allFaseMatches.forEach(m => {
      // Use real teams if known, bracket label if not
      const displayMatch = {
        ...m,
        local: m.local || BRACKET_LABELS[m.id]?.local || '?',
        visitante: m.visitante || BRACKET_LABELS[m.id]?.visitante || '?',
        isPending: !m.local  // flag: teams not yet known
      };
      if (!lb[fase][m.id]) lb[fase][m.id] = {};
      frag.append(matchCard(m, lb[fase][m.id], ST.results[fase]?.[m.id], (field,val) => { lb[fase][m.id][field]=val; }, !canEditElim, fase, '#fff'));
    });
  });

  if (canEditElim) {
    const sb = h('div', {cls:'sbar',style:{display:'flex',gap:'8px'}});
    sb.append(h('button',{cls:'btn btn-acc',style:{padding:'13px 24px',fontSize:'.92rem',borderRadius:'4px',boxShadow:'0 4px 20px rgba(255,255,255,.12)'},onclick:doSave},['💾 Guardar']));
    sb.append(h('button',{cls:'btn btn-green',style:{padding:'13px 24px',fontSize:'.92rem',borderRadius:'4px'},onclick:async()=>{
      if (!confirm('¿Enviar definitivamente? No podrás modificar.')) return;
      const latest = await loadSt();
      const base = (latest && latest.participants) ? latest : ST;
      const newSubmitted = {...(base.submitted||{}), [CU.id]:{...(base.submitted?.[CU.id]||{}), elim:true}};
      save({...base, bets:{...base.bets,[CU.id]:{...base.bets[CU.id]||{},...lb}}, submitted:newSubmitted});
    }},['✅ Enviar']));
    frag.append(sb);
  }
  return frag;
}

    bdCard.append(totalRow);
    frag.append(bdCard);

    const userGroupBets = {};

    const predicted8 = getBestThirds(userGroupBets);
    if (predicted8.length > 0) {

      // Show all 16 matches, use bracket labels for incomplete slots
      const displayR32 = predR32.map(m => ({
        ...m,

          if(localFlag) localEl.append(localFlag);
          localEl.append(h('span',{style:{fontWeight:'700',color:'#fff',textTransform:'uppercase'}},[m.local||'?']));
          const vsEl = h('div',{style:{color:'#333',fontWeight:'800',padding:'0 6px'}},['vs']);

          r32grid.append(row);

    } else {

        ['Rellena más partidos para ver tus mejores terceros y el cuadro de dieciseisavos predicho.']));
    }
    frag.append(bonusCard);
  }

  return frag;
}

    ST.tournamentPhaseChangedAt ? h('span',{style:{color:'#999',fontWeight:'600',marginLeft:'8px'}},['· últ. cambio: '+new Date(ST.tournamentPhaseChangedAt).toLocaleString('es-ES')]) : null,
  ]);
  frag.append(phaseWarn);

  const steps = h('div', {cls:'psteps'});
  ['grupos','eliminatorias','finished'].forEach((p, i) => {
    const done = ['grupos','eliminatorias','finished'].indexOf(ST.tournamentPhase) > i;
    const active = ST.tournamentPhase === p;
    const s = h('div', {cls:'pstep'+(active?' active':done?' done':'')}, [(i+1)+'. '+(p==='grupos'?'Grupos':p==='eliminatorias'?'Eliminatorias':'Finalizado')]);
    s.onclick = () => {
      if (active) return; // already on this phase, no-op
      const ok = confirm('¿Seguro que quieres cambiar la fase del torneo de "'+phaseLabel+'" a "'+(p==='grupos'?'Grupos':p==='eliminatorias'?'Eliminatorias':'Finalizado')+'"?\n\nEsto afecta a TODOS los participantes (por ejemplo, al pasar a Eliminatorias se reparten de golpe los puntos de clasificación de los 12 grupos).');

        Object.entries(scoreInputs).forEach(([key, inp]) => {
          const [fase, field] = key.split('.');
          const val = parseInt(inp.value);
          if (!isNaN(val) && TC.phases[fase]?.points) {
            TC.phases[fase].points[field] = val;
          }
        });
        // Save to storage
        const configToSave = {};
        Object.entries(TC.phases).forEach(([fase, data]) => {
          configToSave[fase] = { ...data.points };
        });
        saveOnly({...ST, config:{ phases: configToSave }});
        savePtsBtn.textContent = '✓ Guardado';
        setTimeout(()=>{ savePtsBtn.textContent = 'Guardar puntuación'; }, 2000);
      }},['Guardar puntuación']);
      card.append(savePtsBtn);
      container.append(card);
    }
  }
}

// ── POINTS BREAKDOWN ─────────────────────────────────────────────
function buildPointsBreakdown(pb, results, elimMatches) {
  const card = h('div',{style:{background:'#111',border:'1px solid #1e1e1e',borderRadius:'8px',padding:'14px 18px',marginBottom:'16px'}});
  card.append(h('div',{style:{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:'800',fontSize:'.8rem',textTransform:'uppercase',letterSpacing:'.1em',color:'#e8b84b',marginBottom:'12px'}},['Desglose de puntos']));

  let totalShown = 0;

  // Row helper - shows all rows, grey if 0
  function row(label, pts, color) {
    const hasPoints = pts > 0;
    if (hasPoints) totalShown += pts;
    const r = h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'5px 0',borderBottom:'1px solid #0a0a0a'}});
    r.append(
      h('span',{style:{fontSize:'.78rem',color:hasPoints?'#aaa':'#333',fontWeight:'500'}},[label]),
      h('span',{style:{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:'900',fontSize:'1rem',color:hasPoints?(color||'#fff'):'#2a2a2a'}},[hasPoints?'+'+pts+' pts':'—'])
    );
    card.append(r);
  }

  // 1. Match points per group - always show
  let matchTotal = 0;
  Object.keys(GD).forEach(g => {
    let gPts = 0;
    GM.filter(m => m.grupo===g).forEach(m => {
      gPts += calcPts(pb.grupos?.[m.id], results.grupos?.[m.id], 'grupos');
    });
    row('Partidos Grupo '+g, gPts, '#fff');
    matchTotal += gPts;
  });

  // Subtotal matches
  const subMatch = h('div',{style:{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid #1e1e1e',marginBottom:'4px'}});
  subMatch.append(
    h('span',{style:{fontSize:'.75rem',color:'#555',fontWeight:'700',textTransform:'uppercase',letterSpacing:'.08em'}},['Subtotal partidos']),
    h('span',{style:{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:'800',fontSize:'.95rem',color:'#fff'}},[matchTotal>0?'+'+matchTotal+' pts':'0 pts'])
  );
  card.append(subMatch);

  // 2. Classification points per group
  let clasifTotal = 0;
  Object.keys(GD).forEach(g => {
    const pred = computeStanding(g, pb.grupos||{}).map(s => s.team);
    const real = results.clasificacion?.[g];
    const pts = (real && real.length) ? calcClasif(pred, real) : 0;
    row('Posiciones tabla Grupo '+g, pts, '#4fc3f7');
    clasifTotal += pts;
  });

  // 3. Best thirds
  const b3pts = calcBestThirdsPoints(pb, results);
  row('Mejores 3os clasificados (x'+Math.round(b3pts/(TC.phases.grupos.points.mejor3||20)||0)+')', b3pts, '#ce93d8');

  // 4. R32 bracket bonus
  const r32pts = calcR32BracketBonus(pb, results);
  row('Emparejamientos 16avos exactos', r32pts, '#80cbc4');

  // 5. Elimination match points
  ['r32','octavos','cuartos','semis','final'].forEach(fase => {
    let fPts = 0;
    Object.entries(results[fase]||{}).forEach(([id,r]) => {
      fPts += calcPts(pb[fase]?.[id], r, fase);
    });
    if (fPts > 0) row(TC.phases[fase].label+' (partidos)', fPts, '#ffcc80');
  });

  // Total line
  const totalRow = h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',marginTop:'4px'}});
  totalRow.append(
    h('span',{style:{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:'800',fontSize:'.85rem',textTransform:'uppercase',letterSpacing:'.08em',color:'#e8b84b'}},['TOTAL']),
    h('span',{style:{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:'900',fontSize:'1.3rem',color:'#e8b84b'}},['+'+totalShown+' pts'])
  );
  card.append(totalRow);

  return card;
}

  const contentWrap = h('div');

  function buildContent() {
    contentWrap.innerHTML = '';
    const p = players.find(x => x.id===selectedId);
    if (!p) return;

    const pb = ST.bets[p.id] || {};
    const totalPts = calcTotal(pb, ST.results, ST.elimMatches);

    // Points summary banner
    const ptsBanner = h('div',{style:{background:'#111',border:'1px solid #1e1e1e',borderRadius:'8px',padding:'12px 18px',marginBottom:'20px',display:'flex',alignItems:'center',justifyContent:'space-between'}});
    ptsBanner.append(
      h('div',{},[
        h('div',{style:{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:'900',fontSize:'1.1rem',color:'#fff',textTransform:'uppercase',letterSpacing:'.06em'}},[p.alias||p.nombre]),
        h('div',{style:{fontSize:'.72rem',color:'#555',marginTop:'2px',fontWeight:'600'}},['Pronósticos fase de grupos'])
      ]),
      h('div',{style:{textAlign:'right'}},[
        h('div',{style:{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:'900',fontSize:'2rem',color:'#e8b84b',lineHeight:'1'}},[totalPts+' pts']),
        h('div',{style:{fontSize:'.65rem',color:'#555',fontWeight:'700',textTransform:'uppercase',letterSpacing:'.08em'}},['total acumulado'])
      ])
    );
    contentWrap.append(ptsBanner);

    // Group matches - show bets vs real results
    Object.entries(GD).forEach(([grupo, {teams, color}]) => {
      const matchesG = GM.filter(m => m.grupo===grupo);
      const anyBet = matchesG.some(m => pb.grupos?.[m.id]?.golesLocal !== undefined);
      if (!anyBet) return;

      const sec = h('div',{cls:'gsec'});
      const ghead = h('div',{cls:'ghead',style:{background:color,marginBottom:'10px'}});
      ghead.append(
        h('div',{cls:'ghead-letter'},['G'+grupo]),
        h('div',{cls:'ghead-info'},[h('div',{cls:'ghead-title'},['GRUPO '+grupo])])
      );
      sec.append(ghead);

      const layout = h('div',{cls:'glayout'});
      const matchesCol = h('div');

      matchesG.forEach(m => {
        const ap = pb.grupos?.[m.id];
        if (!ap || ap.golesLocal === undefined || ap.golesLocal === '') return;
        const res = ST.results.grupos?.[m.id];
        const pts = res ? calcPts(ap, res, 'grupos') : null;

        const card = h('div',{cls:'mcard'+(res?' has-res':'')+(pts!==null?(pts>0?' pts-ok':' pts-no'):'')});
        const meta = h('div',{cls:'mcard-meta'});
        if (m.horaLocal) {
          meta.append(h('span',{},[m.horaLocal]));
          if (m.hora) meta.append(h('span',{style:{color:'#555'}},['('+m.hora+'h ESP)']));
        } else {
          const horaStr = m.hora ? ' · '+m.hora+'h (esp)' : '';
          meta.append(h('span',{},[m.fecha+horaStr]));
        }
        if (m.sede) meta.append(h('span',{},[m.sede]));
        card.append(meta);

        const inner = h('div',{cls:'mcard-inner'});
        inner.append(teamSide(m.local, false));

        const ss = h('div',{cls:'ssec'});
        const rd = h('div',{cls:'rdisp'});
        rd.append(
          h('span',{},[String(ap.golesLocal)]),
          h('span',{style:{color:'#333',margin:'0 2px'}},['·']),
          h('span',{},[String(ap.golesVisitante)])
        );
        ss.append(rd);
        if (res) ss.append(h('div',{style:{fontSize:'.65rem',color:'#666',fontWeight:'700',marginTop:'3px',letterSpacing:'.06em'}},['REAL: '+res.golesLocal+'-'+res.golesVisitante]));
        if (pts !== null) ss.append(h('span',{cls:'ptsbadge'},['+'+pts+' pts']));
        inner.append(ss);
        inner.append(teamSide(m.visitante, true));
        card.append(inner);
        matchesCol.append(card);
      });

      // Predicted standing + bonus breakdown
      const standCol = h('div');
      standCol.append(standingTable(grupo, pb.grupos||{}));

      // Bonus points inline display
      const bonusWrap = h('div',{style:{marginTop:'8px',background:'#0a0a0a',border:'1px solid #1a1a1a',borderRadius:'6px',padding:'8px 12px',fontSize:'.73rem'}});
      bonusWrap.append(h('div',{style:{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:'800',fontSize:'.7rem',textTransform:'uppercase',letterSpacing:'.1em',color:'#444',marginBottom:'6px'}},['Puntos clasificación']));

      const predSt = computeStanding(grupo, pb.grupos||{});
      let autoRealClasif = ST.results.clasificacion?.[grupo];
      if (!autoRealClasif || autoRealClasif.length < 4) {
        const gMs2 = GM.filter(m => m.grupo===grupo);
        if (gMs2.every(m => ST.results.grupos?.[m.id]?.golesLocal !== undefined)) {
          autoRealClasif = computeStanding(grupo, ST.results.grupos||{}).map(s=>s.team);
        }
      }
      const gPts2 = TC.phases.grupos.points;
      const hasRealClasif = autoRealClasif && autoRealClasif.length >= 4;

      // Position/clasif points only shown after group phase closes
      const showClasif = ST.tournamentPhase !== 'grupos';

      // Position rows
      [0,1,2,3].forEach(pos => {
        const predT = predSt[pos]?.team;
        const realT = hasRealClasif ? autoRealClasif[pos] : null;
        const hit = showClasif && realT && predT && predT===realT;
        if (!showClasif) return;
        const row = h('div',{style:{display:'flex',justifyContent:'space-between',padding:'2px 0',borderBottom:'1px solid #111'}});
        row.append(
          h('span',{style:{color:hit?'#fff':'#333'}},[(pos+1)+'º '+( predT||'?')+(realT&&!hit?' ≠ '+realT:'')]),
          h('span',{style:{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:'800',color:hit?'#4fc3f7':'#222'}}, [hit?'+'+gPts2.posicion+' pts':'—'])
        );
        bonusWrap.append(row);
      });

      // Mejor 3º row
      const predThird = predSt[2]?.team;
      if (predThird) {
        const uGrp2={};Object.keys(GD).forEach(g2=>{uGrp2[g2]={};});
        GM.forEach(m=>{if(pb.grupos?.[m.id])uGrp2[m.grupo][m.id]=pb.grupos[m.id];});
        const rGrp2={};Object.keys(GD).forEach(g2=>{rGrp2[g2]={};});
        GM.forEach(m=>{if(ST.results.grupos?.[m.id])rGrp2[m.grupo][m.id]=ST.results.grupos[m.id];});
        const uB8=getBestThirds(uGrp2), rB8=getBestThirds(rGrp2);
        const thirdHit2 = uB8.some(t=>t.team===predThird) && rB8.some(t=>t.team===predThird) && rB8.length>0;
        if (showClasif) {
          const t3row = h('div',{style:{display:'flex',justifyContent:'space-between',padding:'2px 0',borderBottom:'1px solid #111'}});
          t3row.append(
            h('span',{style:{color:thirdHit2?'#fff':'#555'}},['Mejor 3º: '+predThird]),
            h('span',{style:{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:'800',color:thirdHit2?'#ce93d8':'#222'}},[thirdHit2?'+'+gPts2.mejor3+' pts':'—'])
          );
          bonusWrap.append(t3row);
        }
      }

      layout.append(matchesCol, standCol);
      sec.append(layout);
      // Full width below both columns
      bonusWrap.style.marginTop = '0';
      bonusWrap.style.borderRadius = '0 0 8px 8px';
      bonusWrap.style.borderTop = 'none';
      sec.append(bonusWrap);
      contentWrap.append(sec);
    });

    // ── R32 BRACKET PREVIEW ───────────────────────────────────
    const pUserGroupBets = {};
    Object.keys(GD).forEach(g => { pUserGroupBets[g] = {}; });
    GM.forEach(m => { if (pb.grupos?.[m.id]) pUserGroupBets[m.grupo][m.id] = pb.grupos[m.id]; });

    const pPredicted8 = getBestThirds(pUserGroupBets);
    if (pPredicted8.length > 0) {
      const pBonusCard = h('div',{cls:'card',style:{marginTop:'16px'}});
      pBonusCard.append(h('div',{cls:'ctitle'},['🏅 Mejores Terceros & Dieciseisavos Predichos']));

      // Best 8 thirds grid
      const pGrid = h('div',{style:{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'6px',marginBottom:'16px'}});
      pPredicted8.forEach(t => {
        const box = h('div',{style:{background:'#1a1a1a',border:'1px solid #2a2a2a',borderRadius:'6px',padding:'8px',textAlign:'center'}});
        box.append(
          h('img',{src:'https://flagcdn.com/32x24/'+(ISO[t.team]||'xx')+'.png',style:{width:'28px',height:'20px',objectFit:'cover',borderRadius:'2px',display:'block',margin:'0 auto 4px'}}),
          h('div',{style:{fontSize:'.7rem',fontWeight:'700',color:'#fff',textTransform:'uppercase'}},[t.team]),
          h('div',{style:{fontSize:'.65rem',color:'#555',marginTop:'2px'}},['Gpo '+t.grupo+' · '+t.pts+'pts'])
        );
        pGrid.append(box);
      });
      pBonusCard.append(h('p',{style:{color:'#888',fontSize:'.72rem',fontWeight:'700',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:'8px'}},['8 mejores terceros:']), pGrid);

      // R32 bracket
      const pPredR32 = buildPredictedR32(pUserGroupBets);
      const pDisplayR32 = pPredR32.map(m => ({
        ...m,
        local: m.local || BRACKET_LABELS[m.id]?.local || '?',
        visitante: m.visitante || BRACKET_LABELS[m.id]?.visitante || '?',
        isPending: !m.local || !m.visitante
      }));
      pBonusCard.append(h('p',{style:{color:'#888',fontSize:'.72rem',fontWeight:'700',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:'8px'}},
        ['Dieciseisavos predichos (+'+TC.phases.r32.points.emparej+' pts por emparejamiento exacto):']));
      const pR32grid = h('div',{style:{display:'flex',flexDirection:'column',gap:'5px'}});
      pDisplayR32.forEach(m => {
        const row = h('div',{style:{background:m.isPending?'#111':'#1a1a1a',border:'1px solid #1e1e1e',borderRadius:'6px',padding:'7px 12px',display:'flex',alignItems:'center',gap:'8px',fontSize:'.78rem',opacity:m.isPending?'0.5':'1'}});
        const lFlag = ISO[m.local] ? h('img',{src:'https://flagcdn.com/20x15/'+ISO[m.local]+'.png',style:{width:'20px',height:'15px',objectFit:'cover',borderRadius:'2px'}}) : null;
        const vFlag = ISO[m.visitante] ? h('img',{src:'https://flagcdn.com/20x15/'+ISO[m.visitante]+'.png',style:{width:'20px',height:'15px',objectFit:'cover',borderRadius:'2px'}}) : null;
        const lEl = h('div',{style:{display:'flex',alignItems:'center',gap:'5px',flex:'1',justifyContent:'flex-end'}});
        if(lFlag) lEl.append(lFlag);
        lEl.append(h('span',{style:{fontWeight:'700',color:m.isPending?'#555':'#fff',textTransform:'uppercase',fontSize:'.75rem'}},[m.local]));
        const vs = h('span',{style:{color:'#333',fontWeight:'800',padding:'0 6px'}},['vs']);
        const vEl = h('div',{style:{display:'flex',alignItems:'center',gap:'5px',flex:'1'}});
        if(vFlag) vEl.append(vFlag);
        vEl.append(h('span',{style:{fontWeight:'700',color:m.isPending?'#555':'#fff',textTransform:'uppercase',fontSize:'.75rem'}},[m.visitante]));
        row.append(lEl, vs, vEl);
        pR32grid.append(row);
      });
      pBonusCard.append(pR32grid);
      contentWrap.append(pBonusCard);
    }
  }

  buildSelector();
  buildContent();
  frag.append(selectorWrap, contentWrap);
  return frag;
}
