    const secHead = h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'10px',paddingBottom:'8px',borderBottom:'1px solid #1e1e1e'}});
    secHead.append(h('div',{style:{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:'900',fontSize:'1rem',textTransform:'uppercase',letterSpacing:'.08em',color:sec.color}},[sec.title]));
    if (sec.subtitle) secHead.append(h('div',{style:{fontSize:'.68rem',color:'#555',fontWeight:'600',fontStyle:'italic'}},[sec.subtitle]));
    card.append(secHead);

    // Rows
    sec.rows.forEach(([label, key, fase]) => {
      const pts = TC.phases[fase]?.points?.[key];
      if (!pts && pts !== 0) return;
      const row = h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'7px 0',borderBottom:'1px solid #0a0a0a'}});
      row.append(
        h('span',{style:{fontSize:'.85rem',color:'#ccc',fontWeight:'500'}},[label]),
        h('span',{style:{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:'900',fontSize:'1.3rem',color:sec.color}},[ '+'+pts+' pts'])
      );
      card.append(row);
    });

    frag.append(card);
  });

  // Note at bottom
  const note = h('div',{style:{background:'#111',border:'1px solid #1e1e1e',borderRadius:'8px',padding:'14px 18px',marginTop:'8px'}});
  note.append(
    h('div',{style:{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:'800',fontSize:'.8rem',textTransform:'uppercase',letterSpacing:'.1em',color:'#555',marginBottom:'8px'}},['📌 Notas importantes']),
    h('div',{style:{fontSize:'.8rem',color:'#aaa',lineHeight:'1.6'}},['• Los resultados son a 120 minutos (incluyendo prórroga si la hay).']),
    h('div',{style:{fontSize:'.8rem',color:'#aaa',lineHeight:'1.6'}},['• Los penaltis puntúan solo si hay tanda de penaltis (empate a 120 min). Se puntúa el marcador exacto de la tanda (ej. 4-3).']),
    h('div',{style:{fontSize:'.8rem',color:'#aaa',lineHeight:'1.6'}},['• Los puntos de clasificación de grupos se suman al finalizar la fase de grupos.']),
    h('div',{style:{fontSize:'.8rem',color:'#aaa',lineHeight:'1.6'}},['• Por cada marcador individual: el gol del local y el del visitante puntúan por separado (+'+TC.phases.grupos.points.marcador+' pts cada uno).'])
  );
  frag.append(note);

  return frag;
}

// ── MI CUENTA VIEW ───────────────────────────────────────────────
function miCuentaView() {
  const frag = document.createDocumentFragment();

  const banner = h('div', {cls:'pbanner'});
  banner.append(h('div',{},[
    h('h3',{},['👤 Mi cuenta']),
    h('p',{},['ID: '+CU.nombre+' · Alias: '+(CU.alias||CU.nombre)])
  ]));
  frag.append(banner);

  const card = h('div', {cls:'card'});
  card.append(h('div',{cls:'ctitle'},['🔑 Cambiar contraseña']));

  const msgDiv = h('div',{style:{display:'none',marginBottom:'12px'}});
  const currentPw = h('input',{cls:'ifield',type:'password',placeholder:'Contraseña actual',style:{marginBottom:'10px'}});
  const newPw = h('input',{cls:'ifield',type:'password',placeholder:'Nueva contraseña',style:{marginBottom:'10px'}});
  const confirmPw = h('input',{cls:'ifield',type:'password',placeholder:'Confirmar nueva contraseña',style:{marginBottom:'14px'}});

  const saveFn = async () => {
    // Validate
    if (!currentPw.value || !newPw.value || !confirmPw.value) {
      msgDiv.className='errmsg'; msgDiv.textContent='Rellena todos los campos.'; msgDiv.style.display='block'; return;
    }
    if (currentPw.value !== CU.password) {
      msgDiv.className='errmsg'; msgDiv.textContent='La contraseña actual no es correcta.'; msgDiv.style.display='block'; return;
    }
    if (newPw.value.length < 4) {
      msgDiv.className='errmsg'; msgDiv.textContent='La nueva contraseña debe tener al menos 4 caracteres.'; msgDiv.style.display='block'; return;
    }
    if (newPw.value !== confirmPw.value) {
      msgDiv.className='errmsg'; msgDiv.textContent='Las contraseñas no coinciden.'; msgDiv.style.display='block'; return;
    }
    // Update password
    const updated = ST.participants.map(p => p.id===CU.id ? {...p, password:newPw.value} : p);
    CU = {...CU, password:newPw.value};
    const latest = await loadSt();
    const base = (latest && latest.participants) ? latest : ST;
    save({...base, participants:updated});
    currentPw.value=''; newPw.value=''; confirmPw.value='';
    msgDiv.className='okmsg'; msgDiv.textContent='✅ Contraseña cambiada correctamente.'; msgDiv.style.display='block';
    setTimeout(()=>{ msgDiv.style.display='none'; }, 3000);
  };

  const saveBtn = h('button',{cls:'btn btn-acc',onclick:saveFn},['Guardar nueva contraseña']);

  card.append(
    msgDiv,
    h('div',{},[h('label',{cls:'ilabel'},['Contraseña actual']), currentPw]),
    h('div',{},[h('label',{cls:'ilabel'},['Nueva contraseña']), newPw]),
    h('div',{},[h('label',{cls:'ilabel'},['Confirmar nueva contraseña']), confirmPw]),
    saveBtn
  );
  frag.append(card);

  // Show current info (read only)
  const infoCard = h('div',{cls:'card',style:{marginTop:'16px'}});
  infoCard.append(h('div',{cls:'ctitle'},['ℹ️ Mis datos']));
  const rows = [
    ['ID de login', CU.nombre],
    ['Alias visible', CU.alias||CU.nombre],
    ['Contraseña', '••••••••'],
  ];
  rows.forEach(([label, value]) => {
    const row = h('div',{style:{display:'flex',justifyContent:'space-between',padding:'10px 0',borderBottom:'1px solid #1a1a1a'}});
    row.append(
      h('span',{style:{color:'#555',fontSize:'.82rem',fontWeight:'600',textTransform:'uppercase',letterSpacing:'.06em'}},[label]),
      h('span',{style:{color:'#fff',fontWeight:'700'}},[value])
    );
    infoCard.append(row);
  });
  frag.append(infoCard);

  return frag;
}

// ── RENDER ────────────────────────────────────────────────────
function render() {
  // Auto-close bets if deadline passed
  if (ST && ST.deadline) {
    const now = new Date();
    const dl = new Date(ST.deadline);
    if (now > dl && ST.betsOpenGroups) {
      ST = {...ST, betsOpenGroups: false};
      saveSt(ST);
    }
  }
  const app = document.getElementById('app');
  app.innerHTML = '';
  if (!ST) { app.append(h('div',{style:{textAlign:'center',padding:'60px',color:'#333'}},['Cargando...'])); return; }
  if (!CU) { app.append(loginView()); return; }
  // If admin lands on participant-only tab, redirect to ranking
  if (CU?.isAdmin && ['grupos','elim','mis_apuestas','micuenta'].includes(currentTab)) {
    currentTab = 'ranking';
  }
  app.append(buildHeader());
  const page = h('div', {cls:'page'});
  const betsLocked = !ST.betsOpenGroups;
  let tl;
  if (CU?.isAdmin) {
    // Admin sees: Ranking, Pronósticos (if locked), Admin
    tl = [{id:'ranking',l:'🏆 Ranking'}];
    if (betsLocked) tl.push({id:'pronosticos',l:'👁️ Pronósticos'});
    tl.push({id:'admin', l:'🔧 Admin'});
  } else {
    // Participants see all tabs
    tl = [{id:'ranking',l:'🏆 Ranking'},{id:'grupos',l:'⚽ Grupos'},{id:'elim',l:'⚡ Eliminatorias'},{id:'mis_apuestas',l:'📋 Mis apuestas'}];
    if (betsLocked) tl.push({id:'pronosticos',l:'👁️ Pronósticos'});
    tl.push({id:'reglas',l:'📋 Reglas'});
    tl.push({id:'micuenta',l:'👤 Mi cuenta'});
  }
  // Admin also sees Reglas
  if (CU?.isAdmin) tl.splice(tl.length-1, 0, {id:'reglas',l:'📋 Reglas'});
  const tabsEl = h('div', {cls:'tabs'});
  tl.forEach(t2 => {
    const b = h('button', {cls:'tab '+(currentTab===t2.id?'active':''), onclick:()=>{ currentTab=t2.id; render(); }});
    b.textContent = t2.l;
    tabsEl.append(b);
  });
  page.append(tabsEl);
  const view = h('div');
  if (currentTab==='ranking') view.append(rankingView());
  else if (currentTab==='grupos') view.append(groupBetsView());
  else if (currentTab==='elim') view.append(elimBetsView());
  else if (currentTab==='mis_apuestas') view.append(myBetsView());
  else if (currentTab==='pronosticos' && betsLocked) view.append(pronosticosView());
  else if (currentTab==='micuenta' && !CU?.isAdmin) view.append(miCuentaView());
  else if (currentTab==='reglas') view.append(reglasView());
  else if (currentTab==='admin' && CU?.isAdmin) view.append(adminView());
  page.append(view);
  app.append(page);
}

// ── AUTO-REFRESH: poll for new data every 30s ─────────────────────
let _lastUpdated = null;
async function checkForUpdates() {
  if (!CU) return; // only when logged in
  try {
    const r = await fetch(SB_URL+'/rest/v1/porra_state_test?id=eq.main&select=updated_at,data', {headers:SB_HEADERS});
    const rows = await r.json();
    if (rows && rows.length > 0) {
      const serverTime = rows[0].updated_at;
      if (_lastUpdated && serverTime !== _lastUpdated) {
        // New data available - merge carefully (keep local bets, take server results)
        const serverData = rows[0].data;
        // Only update if server has newer results/participants (not our own bets)
        const merged = {
          ...serverData,
          bets: {
            ...serverData.bets,
            ...(ST.bets[CU.id] && Object.keys(ST.bets[CU.id]?.grupos||{}).length >= Object.keys(serverData.bets?.[CU.id]?.grupos||{}).length
              ? {[CU.id]: ST.bets[CU.id]} : {})
          },
          // Admin changes (betsOpen, phase, submitted) always come from server
        };
        // Server is always truth for control fields (betsOpen, phase, submitted)
        ST = {...initSt(), ...merged, results:{...initSt().results,...merged.results}, elimMatches:merged.elimMatches||ET_DATA,
          betsOpenGroups: merged.betsOpenGroups ?? ST.betsOpenGroups,
          betsOpenElim: merged.betsOpenElim ?? ST.betsOpenElim,
          tournamentPhase: merged.tournamentPhase || ST.tournamentPhase,
          submitted: merged.submitted || ST.submitted || {}
        };
        try { localStorage.setItem(SK, JSON.stringify(ST)); } catch{}
        // Only re-render if user is NOT actively typing in a form field
        const activeTag = document.activeElement?.tagName;
        const userTyping = activeTag === 'INPUT' || activeTag === 'TEXTAREA' || activeTag === 'SELECT';
        if (!userTyping) {
          render();
        } else {
          // Defer render for 3s after user stops typing
          clearTimeout(window._deferredRender);
          window._deferredRender = setTimeout(() => {
            const t = document.activeElement?.tagName;
            if (t !== 'INPUT' && t !== 'TEXTAREA' && t !== 'SELECT') render();
          }, 3000);
        }
      }
      _lastUpdated = serverTime;
    }
  } catch(e) {} // silent fail
}
setInterval(checkForUpdates, 30000);

boot();

</script>
